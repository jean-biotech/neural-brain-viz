<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Activation Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=bioluminescent-3">
</head>
<body>
  <main class="app-shell">
    <aside class="control-panel">
      <header class="panel-header">
        <p class="eyebrow">Neural Activation Viewer</p>
        <h1>Brain region activation dashboard</h1>
        <p class="subtle-copy">Type a cue word to trigger a live neural cascade.</p>
      </header>

      <form class="input-form" id="wordForm">
        <label class="input-label" for="wordInput">Cue word</label>
        <div class="input-row">
          <input id="wordInput" name="word" type="text" placeholder="fear, joy, memory, focus..." autocomplete="off">
          <button type="submit">Submit</button>
        </div>
      </form>

      <section class="data-block">
        <div class="data-row">
          <span class="data-label">Current input word</span>
          <span class="data-value" id="currentWord">resting</span>
        </div>
      </section>

      <section class="readout-grid">
        <article class="readout-card">
          <span class="readout-label">Dominant region</span>
          <strong class="readout-value" id="dominantRegion">resting</strong>
        </article>
        <article class="readout-card">
          <span class="readout-label">Connection strength</span>
          <strong class="readout-value" id="connectionStrength">0.00</strong>
        </article>
      </section>

      <section class="chart-card">
        <div class="section-heading">
          <span>Activation readout</span>
        </div>
        <canvas id="activationChart" width="320" height="220" aria-label="Activation level chart"></canvas>
      </section>

    </aside>

    <section class="viz-panel">
      <div class="viz-header">
        <div>
          <p class="eyebrow">Neural network map</p>
          <h2>Regional signaling model</h2>
        </div>
      </div>

      <div class="network-stage">
        <div class="particle-field" aria-hidden="true"></div>
        <svg id="networkSvg" viewBox="0 0 980 660" role="img" aria-label="Interactive neural network visualization"></svg>
        <div class="axis-indicator" aria-hidden="true">
          <span class="axis axis-x">X</span>
          <span class="axis axis-y">Y</span>
          <span class="axis axis-z">Z</span>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js?v=bioluminescent-3"></script>
</body>
</html>
